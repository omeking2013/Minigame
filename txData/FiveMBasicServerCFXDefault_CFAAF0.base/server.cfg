## You SHOULD edit the following:
sv_hostname "KO Development - Server"
sets sv_projectName "KO Development - Server"
sets sv_projectDesc "This is a FiveM server for KO Development. We are currently in development, but we will be releasing our server soon. Stay tuned for more updates!"
sets tags "default, deployer"
sets locale "root-AQ"

load_server_icon KOLogo.png
sets banner_detail "https://i.ibb.co/QjMwdsHC/KOBanner.png"
sets banner_connecting "https://i.ibb.co/QjMwdsHC/KOBanner.png"
setr sv_showBusySpinnerOnLoadingScreen false


## You CAN edit the following:
sv_enforceGameBuild 3258 #mp2024_01	- Bottom Dollar Bounties
sv_licenseKey "cfxk_1DL8BzaEW8cqFa37vOL2c_3qjvhg"
