## You SHOULD edit the following:
sv_hostname "Minigame built with FiveM Basic Server!"
sets sv_projectName "[FiveM Basic Server] Minigame"
sets sv_projectDesc "Recipe for the base resources required to run a minimal FiveM server."
sets tags "default, deployer"
sets locale "root-AQ"

## You CAN edit the following:
sv_enforceGameBuild 3258 #mp2024_01	- Bottom Dollar Bounties
sv_licenseKey "cfxk_1DL8BzaEW8cqFa37vOL2c_3qjvhg"
set mysql_connection_string "mysql://root@localhost/minigame?charset=utf8mb4"
sv_maxclients 5

endpoint_add_tcp "0.0.0.0:30120"
endpoint_add_udp "0.0.0.0:30120"
set steam_webApiKey "ED5EBD94C3817CD41A471E405CC3BC92"
set onesync_enabled true
setr Debug true
# sets sv_pureLevel 1

increase_pool_size "CMoveObject" 75
increase_pool_size "FragmentStore" 14000
increase_pool_size "OcclusionInteriorInfo" 20
increase_pool_size "OcclusionPathNode" 5000
increase_pool_size "OcclusionPortalEntity" 750
increase_pool_size "OcclusionPortalInfo" 750
increase_pool_size "PortalInst" 225
increase_pool_size "ScaleformStore" 200
increase_pool_size "StaticBounds" 5000
increase_pool_size "CWeaponComponentInfo" 2048
increase_pool_size "AttachmentExtension" 430
increase_pool_size "TxdStore" 26000


## These resources will start by default.
# ensure mapmanager
# ensure chat
# ensure spawnmanager
# ensure sessionmanager
# ensure basic-gamemode
# ensure hardcap
ensure oxmysql
ensure mg_core

## Add system admins
add_ace group.admin command allow # allow all commands
add_ace group.admin command.quit deny # but don't allow quit
add_principal identifier.fivem:370382 group.admin #Watcharapong_Soponpa
